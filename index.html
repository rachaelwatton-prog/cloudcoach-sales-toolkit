<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloud Coach Sales Toolkit</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a18;font-size:14px;line-height:1.6}
.app{max-width:900px;margin:0 auto;padding:24px 16px}
.header{margin-bottom:24px}
.header h1{font-size:22px;font-weight:500;margin-bottom:4px}
.header p{font-size:13px;color:#6b6b66}
.tab-bar{display:flex;gap:4px;margin-bottom:24px;border-bottom:1px solid #e0ded6;padding-bottom:0}
.tab{padding:10px 16px;font-size:13px;cursor:pointer;border:none;background:none;color:#6b6b66;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.15s;font-family:inherit}
.tab:hover{color:#1a1a18}
.tab.active{color:#1a1a18;font-weight:500;border-bottom-color:#1a1a18}
.section{display:none}.section.active{display:block}
.nav-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.npill{padding:7px 13px;border:1px solid #d3d1c7;border-radius:8px;background:transparent;color:#6b6b66;font-size:12px;cursor:pointer;transition:all 0.15s;white-space:nowrap;font-family:inherit}
.npill:hover{background:#f0efe8}
.card{background:#fff;border:1px solid #e0ded6;border-radius:12px;padding:20px;margin-bottom:12px}
.sec-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:#9b9990;margin:18px 0 8px}
.pill{font-size:12px;color:#5f5e5a;background:#f0efe8;border-radius:20px;padding:4px 10px;display:inline-block;margin:3px 3px 3px 0}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mc{background:#f7f6f2;border-radius:8px;padding:12px;font-size:13px}
.mc p{margin:0;color:#5f5e5a;line-height:1.6}
.mc strong{display:block;font-weight:600;color:#1a1a18;margin-bottom:4px;font-size:12px}
.dot-row{display:flex;gap:8px;align-items:flex-start;margin-bottom:8px}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px}
.dot-red{background:#e24b4a}
.dot-green{background:#639922}
.dot-blue{background:#378add}
.dot-row p{font-size:13px;color:#5f5e5a;margin:0;line-height:1.6}
.meta-chip{font-size:11px;padding:3px 10px;border-radius:6px;border:1px solid #d3d1c7;color:#6b6b66;display:inline-block;margin:2px}
.accent-left{border-left:2px solid #378add;padding:10px 14px;border-radius:0 8px 8px 0;background:#f0f7ff;margin-bottom:12px}
.accent-left p{font-size:13px;color:#5f5e5a;margin:0;line-height:1.6}
.tag-c{background:#faeeda;color:#633806;border-radius:20px;padding:3px 10px;font-size:12px;display:inline-block;margin-bottom:6px}
.tag-u{background:#e6f1fb;color:#0c447c;border-radius:20px;padding:3px 10px;font-size:12px;display:inline-block;margin-bottom:6px}
.tag-t{background:#e1f5ee;color:#085041;border-radius:20px;padding:3px 10px;font-size:12px;display:inline-block;margin-bottom:6px}
.tag-e{background:#fbeaf0;color:#72243e;border-radius:20px;padding:3px 10px;font-size:12px;display:inline-block;margin-bottom:6px}
.tag-m{background:#eeedfe;color:#3c3489;border-radius:20px;padding:3px 10px;font-size:12px;display:inline-block;margin-bottom:6px}
.tag-d{background:#e1f5ee;color:#085041;border-radius:20px;padding:3px 10px;font-size:12px;display:inline-block;margin-bottom:6px}
.tag-p{background:#faece7;color:#712b13;border-radius:20px;padding:3px 10px;font-size:12px;display:inline-block;margin-bottom:6px}
.tag-i{background:#fbeaf0;color:#72243e;border-radius:20px;padding:3px 10px;font-size:12px;display:inline-block;margin-bottom:6px}
.tag-ch{background:#eaf3de;color:#27500a;border-radius:20px;padding:3px 10px;font-size:12px;display:inline-block;margin-bottom:6px}
.tag-co{background:#f1efe8;color:#444441;border-radius:20px;padding:3px 10px;font-size:12px;display:inline-block;margin-bottom:6px}
.s0a{background:#f0efe8;color:#1a1a18;border-color:transparent;font-weight:500}
.s1a{background:#eeedfe;color:#3c3489;border-color:transparent;font-weight:500}
.s2a{background:#e6f1fb;color:#0c447c;border-color:transparent;font-weight:500}
.s3a{background:#e1f5ee;color:#085041;border-color:transparent;font-weight:500}
.s4a{background:#faeeda;color:#633806;border-color:transparent;font-weight:500}
.s5a{background:#eaf3de;color:#27500a;border-color:transparent;font-weight:500}
@media(max-width:600px){.grid2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>Cloud Coach Sales Toolkit</h1>
    <p>CUTE personas · MEDDPICC qualification · Stage advancement guide</p>
  </div>
  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('cute')">CUTE Personas</button>
    <button class="tab" onclick="switchTab('medd')">MEDDPICC</button>
    <button class="tab" onclick="switchTab('stage')">Stage Advancement</button>
  </div>
  <div id="cute" class="section active">
    <div class="nav-pills" id="cute-nav"></div>
    <div id="cute-panel"></div>
  </div>
  <div id="medd" class="section">
    <div class="nav-pills" id="medd-nav"></div>
    <div id="medd-panel"></div>
  </div>
  <div id="stage" class="section">
    <div class="nav-pills" id="stage-nav"></div>
    <div id="stage-panel"></div>
  </div>
</div>
<script>
function switchTab(id){
  document.querySelectorAll('.tab').forEach((t,i)=>{t.classList.toggle('active',['cute','medd','stage'][i]===id);});
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

var cuteData={
  c:{label:'C — Champion',name:'Champion',role:'Internal advocate — drives the deal from inside',
    who:'Typically a Director or VP of Professional Services, Customer Success, or Operations. They feel the pain most acutely and want the problem solved. At Cloud Coach this is likely the person who owns onboarding, project delivery, or resource management.',
    identify:['Asks detailed outcome questions not feature questions','Has tried to solve this internally with spreadsheets or workarounds','Brings colleagues into calls unprompted','Shares internal data or org context voluntarily','Uses language like "we\'ve been struggling with this"'],
    reach:['Ask your entry contact who owns the day-to-day pain around onboarding or project delivery','Look for Directors or VPs in PS, CS, or Ops on LinkedIn before the call','In discovery ask who would need to champion a change like this internally'],
    tactics:[{t:'Co-build the business case',b:'Give them a template. Champions want to look good internally — equip them with ROI numbers, a one-pager, and talking points they can use in internal meetings without you in the room.'},{t:'Reference stories',b:'Share a relevant customer story. Champions repeat these stories — make them easy to retell.'},{t:'Keep them warm between calls',b:'Short useful touchpoints — a relevant article, a product update, a quick check-in. Champions go cold if you only contact them when you need something.'},{t:'Help them navigate their EB',b:'Coach the Champion on how to get budget approval. Prep them with the language the CFO or CEO responds to: cost reduction, risk mitigation, competitive positioning.'}],
    bizcase:'Frame value around their personal win: fewer fires, smoother delivery, better team utilisation. Tie to metrics they already track — onboarding cycle time, project margin, resource utilisation %. Show how Cloud Coach owns the workflow layer so their team stops doing manual coordination in spreadsheets.',
    ibg:'#faeeda',ic:'#633806',btnStyle:'background:#faeeda;color:#633806;border-color:transparent;font-weight:500'
  },
  u:{label:'U — User',name:'User',role:'Day-to-day operator — adoption depends on their buy-in',
    who:'Project managers, customer success managers, resource planners, implementation consultants. They will live inside the product every day. Their concerns are practical: is it easy to use, does it replace multiple tools, will it break mid-project?',
    identify:['Asks "how does this actually work in practice?" questions','Concerned about migration, training, and disruption','May be skeptical — they\'ve seen tools come and go','Often on the demo call but not at the exec briefing'],
    reach:['Ask the Champion if you can run a working session with the team who would use this daily','Request a process walkthrough — walk me through how you onboard a new customer today','Offer a sandbox or trial as users self-select in'],
    tactics:[{t:'Workflow walkthrough',b:'Map their current process step by step before showing anything. Concrete substitution beats abstract feature demos.'},{t:'Address the disruption fear directly',b:'Acknowledge switching costs upfront. Show your implementation timeline, training plan, and migration support.'},{t:'Let them drive the demo',b:'Give them a sandbox with their own use case loaded in. Self-directed exploration builds confidence.'},{t:'Make early wins easy',b:'Identify one quick win they can show their manager in week one. Users who get an early win become internal evangelists.'}],
    bizcase:'Users don\'t buy on ROI — they buy on whether this will make their day easier. Show time saved per task, reduction in status-update meetings, fewer tools to context-switch between. Tie AI features to relief from manual work.',
    ibg:'#e6f1fb',ic:'#0c447c',btnStyle:'background:#e6f1fb;color:#0c447c;border-color:transparent;font-weight:500'
  },
  t:{label:'T — Technical buyer',name:'Technical buyer',role:'Gatekeeper for security, integrations, and architecture',
    who:'Head of IT, VP or Director of Engineering, Salesforce Admin, or Enterprise Architect. For Cloud Coach — which lives on Salesforce — the Salesforce admin or platform architect is often the critical technical voice.',
    identify:['Asks about APIs, data residency, SSO, and permissioning early','Wants to see security documentation or App Exchange listing','May not attend the business demo — needs a separate technical call','Asks: "What\'s the data model?", "What happens to our data if we cancel?"'],
    reach:['Ask if there is a Salesforce admin or IT lead to loop in for a technical review','Send a technical one-pager proactively after the first discovery call','Reference the App Exchange listing and the completed Salesforce security review'],
    tactics:[{t:'Lead with the Salesforce-native story',b:'Cloud Coach runs natively on Salesforce — no external data silo, no ETL, no separate login. For a Salesforce shop this is a major technical advantage.'},{t:'Bring the security review completion',b:'The Salesforce security review is complete — share it proactively. Technical buyers are used to vendors hand-waving security; documentation changes the conversation.'},{t:'Offer a separate technical sandbox call',b:'30 minutes with IT to walk through the data model, permissions, and API usage. Stops them from derailing the business demo.'},{t:'Map to their existing architecture',b:'Ask what other tools are in their stack before showing anything. Show exactly how Cloud Coach sits alongside their existing setup with no duplication.'}],
    bizcase:'Technical buyers don\'t approve budget but they can kill deals with a veto. Their business case is a risk case: security review passed, native to existing infrastructure, low implementation lift, defined rollback path.',
    ibg:'#e1f5ee',ic:'#085041',btnStyle:'background:#e1f5ee;color:#085041;border-color:transparent;font-weight:500'
  },
  e:{label:'E — Economic buyer',name:'Economic buyer',role:'Budget authority — the deal doesn\'t close without them',
    who:'CFO, COO, CEO in mid-market, or VP of Finance. They rarely attend early calls — they show up when a budget request lands on their desk. For Cloud Coach\'s enterprise motion this is the person who approves multi-year digital transformation spend.',
    identify:['Not usually in early discovery — if they are treat it as a major signal','Their questions are financial: payback period, cost vs. build/buy, headcount impact','They respond to peer benchmarks and competitive risk more than feature lists','You will often meet them only once — make it count'],
    reach:['Ask the Champion directly who controls the budget and whether you can get 20 minutes with them','Never let the Champion present to the EB alone — equip them but ask to be present','Frame the request as executive alignment not a sales meeting','Use Frank strategically for EB-to-EB conversations after the Champion has primed them'],
    tactics:[{t:'Open with the strategic frame not the product',b:'The EB doesn\'t want a demo. They want to know: why now, why us, and what happens if we don\'t act? Every company has an AI mandate — Cloud Coach is the workflow layer answer.'},{t:'Quantify the cost of inaction',b:'Build a do-nothing case. How much is manual resource allocation costing? What\'s the margin impact of delayed onboarding? The EB responds to numbers they already care about.'},{t:'Use the 18-month transformation narrative',b:'For enterprise deals Cloud Coach isn\'t a tool purchase — it\'s a digital transformation. Frame as phased investment: workflow automation then AI-assisted resource management then full agentic capability.'},{t:'Prepare the Champion to present ROI',b:'Build a one-page financial summary: total cost, expected efficiency gains, payback period, risk reduction. Keep it to three numbers max.'}],
    bizcase:'Three parts: (1) Cost reduction — hours of manual coordination eliminated in dollar value at loaded cost. (2) Revenue impact — faster onboarding equals faster time-to-value and lower churn risk. (3) Strategic positioning — Cloud Coach is the enterprise post-sales unification layer ahead of the AI mandate.',
    ibg:'#fbeaf0',ic:'#72243e',btnStyle:'background:#fbeaf0;color:#72243e;border-color:transparent;font-weight:500'
  }
};

function buildCute(){
  var nav=document.getElementById('cute-nav');
  Object.keys(cuteData).forEach(function(k){
    var d=cuteData[k];var b=document.createElement('button');
    b.className='npill';b.id='cn-'+k;b.textContent=d.label;
    b.onclick=function(){showCute(k);};nav.appendChild(b);
  });showCute('c');
}

function showCute(k){
  var d=cuteData[k];
  document.querySelectorAll('#cute-nav .npill').forEach(function(b){b.style.cssText='';});
  document.getElementById('cn-'+k).style.cssText=d.btnStyle;
  var idH=d.identify.map(function(i){return'<span class="pill">'+i+'</span>';}).join('');
  var reH=d.reach.map(function(r){return'<div class="dot-row"><div class="dot dot-blue"></div><p>'+r+'</p></div>';}).join('');
  var taH=d.tactics.map(function(t){return'<div class="mc"><strong>'+t.t+'</strong><p>'+t.b+'</p></div>';}).join('');
  document.getElementById('cute-panel').innerHTML=
    '<div class="card"><div style="display:flex;gap:12px;align-items:flex-start"><div style="width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:500;flex-shrink:0;background:'+d.ibg+';color:'+d.ic+'">'+k.toUpperCase()+'</div><div><h2 style="font-size:20px;font-weight:500;margin:0 0 2px">'+d.name+'</h2><p style="font-size:13px;color:#6b6b66;margin:0 0 10px">'+d.role+'</p><p style="font-size:13px;color:#5f5e5a;line-height:1.7;margin:0">'+d.who+'</p></div></div></div>'+
    '<div class="sec-label">How to identify them</div><div style="margin-bottom:16px">'+idH+'</div>'+
    '<div class="sec-label">How to reach them</div><div style="margin-bottom:16px">'+reH+'</div>'+
    '<div class="sec-label">Tactics</div><div class="grid2" style="margin-bottom:16px">'+taH+'</div>'+
    '<div class="sec-label">Building the business case</div><div class="accent-left"><p>'+d.bizcase+'</p></div>';
}

var meddData={
  m:{label:'M — Metrics',letter:'M',name:'Metrics',ibg:'#eeedfe',ic:'#3c3489',btnStyle:'background:#eeedfe;color:#3c3489;border-color:transparent;font-weight:500',
    def:'The quantifiable value the customer expects to gain. Without agreed metrics there is no business case and no urgency — you are selling a feature not an outcome.',
    cc:'Cloud Coach deals require an 18-month enterprise sales cycle. The ROI story must be specific enough to justify multi-year budget. Vague value statements will not survive a CFO review.',

  },
  e:{label:'E — Economic buyer',letter:'E',name:'Economic buyer',ibg:'#e6f1fb',ic:'#0c447c',btnStyle:'background:#e6f1fb;color:#0c447c;border-color:transparent;font-weight:500',
    def:'The single person with budget authority and final sign-off. Not the committee. The one person who can say yes when everyone else says no.',
    cc:'For Cloud Coach\'s enterprise motion this is typically a CFO, COO, or CEO. The current sales team is burning executive access too early — involving Frank before internal consensus is built.',
    qualify:['Who has final sign-off on a project of this size?','Has budget been allocated or does it need to be approved?','If the business case is compelling who writes the cheque?','Is there anyone above your level whose sign-off we would need?'],

    redflags:['You\'ve never spoken to the EB directly','The Champion says they can approve it themselves — verify this','The EB keeps getting pushed back or is "too busy"','You involved Frank too early and burned the asset before consensus was built']

  dc:{label:'D — Decision criteria',letter:'D',name:'Decision criteria',ibg:'#e1f5ee',ic:'#085041',btnStyle:'background:#e1f5ee;color:#085041;border-color:transparent;font-weight:500',
    def:'The formal and informal requirements the prospect will use to evaluate vendors. If you don\'t know the criteria you can\'t control how you are being scored.',
    cc:'Prospects now filter on AI at the top of funnel. If AI capability is not in your decision criteria response you may not make the shortlist. The Percursive situation showed what happens when a competitor maps to criteria you ignored.',
    qualify:['What does your ideal solution look like?','Are there must-haves versus nice-to-haves on your evaluation list?','Is AI capability a formal requirement or a preference?','Are you evaluating other vendors and what are they doing well?','Who else is involved in setting the evaluation criteria?'],
    tactics:[{t:'Get the criteria in writing early',b:'Ask the Champion to share the RFP or scoring matrix. If there isn\'t one, offer to help build it — you\'ll naturally influence the criteria in your favour.'},{t:'Lead with Salesforce-native as a criterion',b:'Reframe the evaluation to include infrastructure fit. Cloud Coach running natively on Salesforce is a major advantage for Salesforce shops.'},{t:'Add AI workflow ownership as a criterion',b:'Help the prospect articulate what AI-readiness means in a PSA tool. Owning the workflow layer is a position Percursive can\'t match on depth.'},{t:'Map every criterion to a proof point',b:'Build a matrix: their stated criteria on the left, your evidence on the right. Share it with the Champion so they can use it internally.'}],
    redflags:['You don\'t know what they are evaluating on','Criteria keep changing — political instability inside the account','A competitor was involved in setting the criteria','AI is listed as a must-have and you haven\'t addressed it yet']

  dp:{label:'D — Decision process',letter:'D',name:'Decision process',ibg:'#faeeda',ic:'#633806',btnStyle:'background:#faeeda;color:#633806;border-color:transparent;font-weight:500',
    def:'How the decision will actually be made — who is involved, in what sequence, and by when. This is the mechanics of how they reach a verdict.',
    cc:'Cloud Coach\'s enterprise deals have cycles up to 18 months. Without understanding the decision process you can\'t forecast accurately or build the urgency needed to keep momentum.',
    qualify:['Walk me through how a decision like this typically gets made here','Who else needs to be involved or sign off before you can move forward?','Is there a formal procurement or legal review process?','What does your timeline look like?','What would cause this to stall or not happen this year?'],
    tactics:[{t:'Map the decision committee explicitly',b:'Ask the Champion to identify everyone who touches this decision — approvers, influencers, blockers. You need to know about the IT veto before it happens.'},{t:'Establish a mutual action plan',b:'Build a shared document with both sides\' steps, owners, and dates. A Champion who co-authors the plan is accountable to it.'},{t:'Identify the paper process early',b:'Procurement and legal can add 30-90 days to a close. Ask about this in discovery — not at the end.'},{t:'Create a reason to decide',b:'Long sales cycles die from inertia. Build in a compelling event: a renewal window, an upcoming board meeting, a competitor threat.'}],
    redflags:['No clear timeline or decision date','Every call ends with "we\'ll need to discuss internally"','You haven\'t met anyone beyond the Champion','The process keeps changing or getting extended']

    def:'The legal, procurement, and contractual steps required to convert a verbal yes into a signed contract. Often the hidden deal-killer.',
    cc:'Enterprise deals at Cloud Coach\'s target size will involve procurement review, legal redlines, and a Salesforce partner agreement review. The security review situation showed that compliance steps can appear late and derail timelines.',

    redflags:['Legal review hasn\'t been mentioned and you\'re at late stage','Prospect uses a complex vendor onboarding process you just discovered','The signatory is someone you\'ve never spoken to','Contract is with a PE-backed entity — parent company approval may be needed']
  },
  i:{label:'I — Identify pain',letter:'I',name:'Identify pain',ibg:'#fbeaf0',ic:'#72243e',btnStyle:'background:#fbeaf0;color:#72243e;border-color:transparent;font-weight:500',
    def:'The specific business-level problem the prospect needs to solve. Pain must be felt by someone with power, or it won\'t drive a decision.',
    cc:'The sales team is demoing features before establishing pain. Real pain points are: manual PS coordination at scale, inability to onboard customers fast enough, resource allocation in spreadsheets, and lack of an AI narrative for the board.',
    qualify:['What\'s the biggest operational challenge in your post-sales or PS motion right now?','How are you currently handling resource allocation and capacity planning?','When a customer onboarding goes wrong what does that cost you?','Is your PS team able to scale without proportionally growing headcount?','Has your board or CEO asked for an AI strategy?'],
    tactics:[{t:'Pain before product — always',b:'Do not open a screen share until you have articulated their pain back to them and they\'ve confirmed it. Make sure you\'re solving a problem they\'ve acknowledged out loud.'},{t:'Quantify the pain',b:'Soft pain doesn\'t buy software. Help the prospect put a number on it — even a rough one. The act of quantifying creates ownership.'},{t:'Connect pain to the AI mandate',b:'Every prospect has been told by their CEO to have an AI strategy. Cloud Coach\'s workflow layer is a credible first step toward that mandate.'},{t:'Use Dylan for pain validation',b:'Dylan as Head of PS can speak peer-to-peer with the prospect\'s PS or CS leader. A practitioner validating the pain is more credible than a sales rep describing it.'}],

function buildMedd(){
  var nav=document.getElementById('medd-nav');
  Object.keys(meddData).forEach(function(k){
    var d=meddData[k];var b=document.createElement('button');
    b.className='npill';b.id='mn-'+k;b.textContent=d.label;
    b.onclick=function(){showMedd(k);};nav.appendChild(b);
  });showMedd('m');
}

function showMedd(k){
  var d=meddData[k];
  document.querySelectorAll('#medd-nav .npill').forEach(function(b){b.style.cssText='';});
  document.getElementById('mn-'+k).style.cssText=d.btnStyle;
  var qH=d.qualify.map(function(q){return'<span class="pill">'+q+'</span>';}).join('');
  var taH=d.tactics.map(function(t){return'<div class="mc"><strong>'+t.t+'</strong><p>'+t.b+'</p></div>';}).join('');
  var rfH=d.redflags.map(function(r){return'<div class="dot-row"><div class="dot dot-red"></div><p>'+r+'</p></div>';}).join('');

    '<div class="card"><div style="display:flex;gap:12px;align-items:flex-start"><div style="width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:500;flex-shrink:0;background:'+d.ibg+';color:'+d.ic+'">'+d.letter+'</div><div><h2 style="font-size:20px;font-weight:500;margin:0 0 2px">'+d.name+'</h2><p style="font-size:13px;color:#5f5e5a;margin:0 0 10px;line-height:1.6">'+d.def+'</p><p style="font-size:13px;color:#5f5e5a;margin:0;line-height:1.7;padding-top:10px;border-top:1px solid #e8e6de"><span style="font-weight:600;color:#1a1a18">Cloud Coach context: </span>'+d.cc+'</p></div></div></div>'+

    '<div class="sec-label">Red flags</div><div>'+rfH+'</div>';
}

function buildStage(){
  var nav=document.getElementById('stage-nav');
  stageData.forEach(function(s){
    var b=document.createElement('button');
    b.className='npill';b.id='sn-'+s.id;
    b.textContent=s.label+': '+s.name;
    b.onclick=function(){showStage(s.id);};
    nav.appendChild(b);
  });showStage('s0');
}

function showStage(id){
  var s=stageData.find(function(x){return x.id===id;});
  document.querySelectorAll('#stage-nav .npill').forEach(function(b){b.className='npill';});
  document.getElementById('sn-'+id).classList.add(s.cls);
  var cuteH=s.cute.map(function(c){return'<div class="mc"><strong><span class="'+c.tag+'" style="margin-bottom:6px">'+c.code+' — '+c.cname+'</span></strong><p>'+c.note+'</p></div>';}).join('');
  var mH=s.medd.map(function(m){return'<div class="dot-row"><div class="dot dot-blue"></div><p>'+m+'</p></div>';}).join('');
  var rfH=s.redflags.map(function(r){return'<div class="dot-row"><div class="dot dot-red"></div><p>'+r+'</p></div>';}).join('');
  var ccH=s.ccmust.map(function(q){return'<div class="dot-row"><div class="dot dot-green"></div><p>'+q+'</p></div>';}).join('');
  document.getElementById('stage-panel').innerHTML=
    '<div class="card"><div><h2 style="font-size:18px;font-weight:500;margin:0 0 4px">'+s.label+': '+s.name+'</h2><p style="font-size:13px;color:#5f5e5a;margin:0 0 10px">'+s.objective+'</p><div>'+['Owner: '+s.owner,'Forecast: '+s.forecast,'Probability: '+s.pct,'Phase: '+s.phase].map(function(x){return'<span class="meta-chip">'+x+'</span>';}).join('')+'</div></div><div style="margin-top:12px;padding-top:12px;border-top:1px solid #e8e6de"><p style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:#9b9990;margin:0 0 4px">Gate to advance</p><p style="font-size:13px;color:#5f5e5a;margin:0;line-height:1.6">'+s.advance+'</p></div></div>'+
